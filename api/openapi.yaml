openapi: 3.0.3
info:
  title: SPM Project Management API
  description: API for managing software projects through SPM (Super Project Manager)
  version: 1.0.0
  contact:
    name: SPM Support
servers:
  - url: https://{host}/api
    variables:
      host:
        default: spm.workers.dev
        description: Worker deployment domain

paths:
  /health:
    get:
      summary: Health check endpoint
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /projects:
    get:
      summary: List all SPM-managed projects
      operationId: listProjects
      parameters:
        - name: status
          in: query
          description: Filter by project status
          schema:
            type: string
            enum: [active, archived, all]
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'

    post:
      summary: Create a new project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewProject'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{projectId}:
    get:
      summary: Get project details
      operationId: getProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{projectId}/tasks:
    get:
      summary: List tasks for a project
      operationId: listTasks
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [todo, doing, done, blocked, skipped, all]
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'

    post:
      summary: Create a new task
      operationId: createTask
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTask'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{taskId}:
    patch:
      summary: Update task status/evidence
      operationId: updateTask
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        timestamp:
          type: string
          format: date-time
        version:
          type: string

    Project:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [not_started, in_development, in_review, deployed, on_hold, completed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        total:
          type: integer

    NewProject:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    Task:
      type: object
      required: [id, project_id, name, status]
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        description:
          type: string
        context_brief:
          type: string
          description: "Self-contained cold-start context for agent execution"
        model_tier:
          type: string
          enum: [fast, standard, strong]
          description: "Recommended model tier for task execution"
        status:
          type: string
          enum: [todo, doing, done, blocked, skipped]
        phase:
          type: string
          enum: [requirement, planning, execution, quality, delivery]
        priority:
          type: string
          enum: [critical, high, medium, low]
        dependencies:
          type: array
          items:
            type: string
        exit_criteria:
          type: array
          items:
            type: string
        evidence:
          type: array
          items:
            type: string
        assigned_to:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    TaskListResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer

    NewTask:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        context_brief:
          type: string
          description: "Self-contained cold-start context"
        model_tier:
          type: string
          enum: [fast, standard, strong]
        phase:
          type: string
          enum: [requirement, planning, execution, quality, delivery]
        priority:
          type: string
          enum: [critical, high, medium, low]
        dependencies:
          type: array
          items:
            type: string

    TaskUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [todo, doing, done, blocked, skipped]
        evidence:
          type: array
          items:
            type: string
        completed_at:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: object
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
